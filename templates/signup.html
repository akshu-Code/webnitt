{% extends "base.html" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head class ="">
<body>
{% block content %}

<div class="py-6 bg-gray-50 min-h-screen">
    <div class="max-w-lg mx-auto border border-gray-200 rounded-2xl shadow-lg bg-white overflow-hidden">
        <form action="/signup" method="POST" class="text-center px-6 py-6">
            <h1 class="text-2xl font-semibold py-6 text-gray-800">Signup Here</h1>
            <div class="m-5 space-y-4">
                <div class="flex flex-col pb-4">
                    <label for="username" class="text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input class="border border-gray-300 rounded-2xl px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-300" 
                           type="text" 
                           name="username" 
                           placeholder ="Enter name"
                           required>
                </div>
                <div class="flex flex-col">
                    <label for="username" class="text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input class="border border-gray-300 rounded-2xl px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-300" 
                           type="text" 
                           name="password" 
                           placeholder ="Enter password"
                           required>
                </div>
            </div> 
            <div class="pb-10 py-6">
                <button class="bg-blue-600 text-white px-10 py-2 rounded-2xl transform hover:scale-95 transition duration-200" type="submit">SignUp</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

    
    

</body>
</html>
